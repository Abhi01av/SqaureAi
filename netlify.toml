[build]
  # Run an explicit install during the build so Linux-only optional deps (Rollup native)
  # are present even when `package-lock.json` was generated on macOS.
  command = "rm -rf node_modules && rm -f package-lock.json && npm install --include=optional --no-audit --no-fund && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20.19.0"
  # Ensure Rollup's platform-specific optional dependency is installed on Netlify.
  # Fixes: "Cannot find module @rollup/rollup-linux-x64-gnu"
  NPM_FLAGS = "--include=optional"
